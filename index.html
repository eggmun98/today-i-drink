<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍶 오늘 나의 적정 음주량 🍶</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Jua', -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: #5b4b6a;
    background: linear-gradient(160deg, #ffe1ec 0%, #e7f3ff 48%, #f0e6ff 100%);
    background-attachment: fixed;
    min-height: 100vh; padding: 18px; display: flex; justify-content: center;
  }
  .app { width: 100%; max-width: 440px; }
  h1 {
    text-align: center; font-size: 30px; color: #ff6f91; margin: 6px 0 2px;
    text-shadow: 2px 2px 0 #fff; animation: wiggle 2.6s ease-in-out infinite;
  }
  @keyframes wiggle { 0%,100%{transform:rotate(-2.5deg);} 50%{transform:rotate(2.5deg);} }
  .sub { font-family:'Gaegu',sans-serif; text-align:center; color:#8a7a99; font-size:15px; margin-bottom:16px; line-height:1.5; }

  .card {
    background:#fff; border-radius:28px; padding:22px; margin-bottom:16px; border:3px solid #fff;
    box-shadow: 0 10px 0 rgba(255,143,177,.16), 0 16px 32px rgba(150,120,200,.18);
  }
  .progress { height:12px; background:#ffe3ee; border-radius:99px; margin-bottom:18px; overflow:hidden; }
  .progress > div { height:100%; border-radius:99px; background:linear-gradient(90deg,#ff9ec4,#ffd45e); transition:width .45s cubic-bezier(.3,1.4,.5,1); }

  .q { font-size:21px; color:#ff6f91; margin-bottom:4px; line-height:1.35; }
  .qhint { font-family:'Gaegu',sans-serif; font-size:15px; color:#9b8aa8; margin-bottom:16px; line-height:1.5; }

  .opts { display:grid; gap:11px; }
  .opt {
    padding:15px 16px; border-radius:18px; border:2.5px solid #ffe1ea; background:#fff7fb;
    cursor:pointer; font-size:16px; color:#6b5b7a; display:flex; align-items:center; gap:11px;
    transition:.18s cubic-bezier(.3,1.5,.5,1);
  }
  .opt:hover { border-color:#ffc4d6; }
  .opt:active { transform:scale(.96); }
  .opt.sel {
    background:linear-gradient(135deg,#fff0f5,#ffe7f0); border-color:#ff8fb1; color:#ff5d86;
    box-shadow:0 4px 0 rgba(255,143,177,.3); transform:translateY(-1px);
  }
  .opt .em { font-size:24px; }

  .num-row { display:flex; gap:12px; }
  .num-row > div { flex:1; }
  label.fld { display:block; font-size:14px; color:#9b8aa8; margin-bottom:6px; }
  input, select {
    width:100%; padding:13px 14px; border-radius:16px; border:2.5px solid #ffe1ea;
    background:#fff7fb; color:#6b5b7a; font-size:17px; font-family:'Jua',sans-serif;
  }
  input:focus, select:focus { outline:none; border-color:#ff8fb1; }

  .nav { display:flex; gap:12px; margin-top:20px; }
  .btn {
    flex:1; padding:16px; border:none; border-radius:99px; cursor:pointer; font-size:18px;
    font-family:'Jua',sans-serif; color:#fff;
    background:linear-gradient(135deg,#ff9ec4,#ff7a9c); box-shadow:0 5px 0 #ef6088; transition:.12s;
  }
  .btn:disabled { opacity:.4; }
  .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #ef6088; }
  .btn.ghost { flex:0 0 84px; background:linear-gradient(135deg,#cdb8f0,#b693f5); box-shadow:0 5px 0 #9a76d8; }
  .btn.ghost:active { box-shadow:0 2px 0 #9a76d8; }

  /* result */
  .hero { text-align:center; padding:8px 0; }
  .hero .label { font-family:'Gaegu',sans-serif; font-size:16px; color:#9b8aa8; }
  .hero .amount {
    font-size:60px; line-height:1.05; margin:6px 0;
    background:linear-gradient(135deg,#ff6f91,#ffa45e); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero .unit { font-size:20px; }
  .verdict { text-align:center; font-size:18px; color:#ff6f91; margin:6px 0 16px; }

  .info-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:11px; margin:14px 0; }
  .info { background:#fff7fb; border:2.5px solid #ffe1ea; border-radius:18px; padding:13px; text-align:center; }
  .info .ic { font-size:26px; }
  .info .t { font-family:'Gaegu',sans-serif; font-size:13px; color:#9b8aa8; margin:5px 0 2px; }
  .info .v { font-size:16px; color:#ff6f91; }

  .subcard { background:#fffaf0; border:2.5px dashed #ffd45e; border-radius:20px; padding:16px; margin:0 0 14px; color:#7a6a55; }
  .subcard b { color:#ff8c42; }
  .tips { font-family:'Gaegu',sans-serif; font-size:16px; line-height:1.9; }
  .tips li { margin-left:18px; }

  .factors { font-size:15px; line-height:1.9; margin-top:8px; }
  .factors .up { color:#27c498; }
  .factors .dn { color:#ff7a9c; }

  .warn { background:#fff0f0; border:2.5px solid #ffb3b3; border-radius:20px; padding:16px; font-size:14px; margin-top:14px; line-height:1.7; color:#c0506a; }
  .warn b { color:#e23d5a; }

  footer { font-family:'Gaegu',sans-serif; text-align:center; font-size:13px; color:#a294b0; margin:16px 0; line-height:1.7; }
</style>
</head>
<body>
<div class="app">
  <h1>🍶 오늘 나의 적정선</h1>
  <div class="sub">술 피할 수 없는 날, 내 몸·체질·컨디션 기준<br>"여기까진 괜찮아" 상한선을 잡아드려요</div>

  <div class="card" id="quizCard">
    <div class="progress"><div id="bar" style="width:0%"></div></div>
    <div id="qbox"></div>
    <div class="nav">
      <button class="btn ghost" id="prevBtn" onclick="prev()">이전</button>
      <button class="btn" id="nextBtn" onclick="next()">다음</button>
    </div>
  </div>

  <div class="card" id="resultCard" style="display:none"></div>

  <footer>
    이 결과는 의학적 처방이 아닌 <b>참고용 추정</b>이에요.<br>
    가장 건강한 음주량은 0잔입니다. 음주운전 절대 금지 🚫🚗<br>
    임신·복약·질환 시엔 한 잔도 위험할 수 있어요.
  </footer>
</div>

<script>
const ETHANOL = 0.789;
const SOJU_BOTTLE_G = 360 * 0.165 * ETHANOL; // 소주 1병당 알코올 ≈ 46.9g
const SOJU_GLASS_G  = 50  * 0.165 * ETHANOL; // 소주 1잔 ≈ 6.5g

// ---- 질문 정의 ----
const Q = [
  { type:'choice', id:'goal', q:'오늘 어디까지 취하고 싶어요?', hint:'목표에 맞춰 적정량을 계산해드려요. 같은 목표라도 주량에 따라 양이 달라져요.',
    opts:[
      {v:0, em:'😐', t:'맨정신 유지 (거의 안 취하게)'},
      {v:1, em:'😊', t:'알딸딸하게 (기분 좋을 만큼)'},
      {v:2, em:'🥴', t:'적당히 취한 정도'},
      {v:3, em:'🥃', t:'필름 끊길 만큼 (⚠️ 권장 안 함)'},
    ]},
  { type:'fields', q:'기본 정보', hint:'혈중알코올농도 계산에 꼭 필요해요.',
    fields:[
      {id:'sex', label:'성별', el:'select', opts:[['M','남'],['F','여']]},
      {id:'weight', label:'체중(kg)', el:'input', t:'number', val:65},
      {id:'age', label:'나이', el:'input', t:'number', val:30},
      {id:'hours', label:'마실 시간(시간)', el:'input', t:'number', val:3, step:0.5},
    ]},
  { type:'choice', id:'tolerance', q:'평소 주량이 어느 정도예요?', hint:'소주 기준으로 "편하게" 마시는 양이요.',
    opts:[
      {v:0, em:'🥤', t:'거의 못 마심 (1병 미만)'},
      {v:1, em:'🍶', t:'보통 (1~2병)'},
      {v:2, em:'🍶🍶', t:'잘 마심 (2~3병)'},
      {v:3, em:'🐉', t:'말술 (3병 이상)'},
    ]},
  { type:'choice', id:'redface', q:'술 마시면 얼굴이 빨개지는 편이에요?', hint:'빨개짐 = 알코올 분해효소(ALDH)가 약하다는 신호. 적정량이 확 줄어요.',
    opts:[
      {v:2, em:'🟥', t:'한 잔만 마셔도 금방 빨개짐'},
      {v:1, em:'🟧', t:'좀 마시면 빨개짐'},
      {v:0, em:'🟩', t:'잘 안 빨개짐'},
    ]},
  { type:'choice', id:'freq', q:'평소 술 마시는 횟수는?', hint:'자주 마시면 간이 쉴 시간이 필요해요.',
    opts:[
      {v:0, em:'📅', t:'거의 안 마심 (월 1회 이하)'},
      {v:1, em:'📅', t:'가끔 (주 1~2회)'},
      {v:2, em:'📅', t:'자주 (주 3~4회)'},
      {v:3, em:'📅', t:'거의 매일'},
    ]},
  { type:'choice', id:'snack', q:'술 마실 때 안주는?', hint:'빈속 음주는 흡수가 빨라 더 빨리 취해요.',
    opts:[
      {v:3, em:'🍖', t:'항상 든든하게 먹음'},
      {v:2, em:'🥜', t:'가끔/조금'},
      {v:1, em:'🫧', t:'거의 안 먹음'},
      {v:0, em:'🚫', t:'아예 안 먹음 (술만!)'},
    ]},
  { type:'multi', id:'helpers', q:'평소 술자리에서 같이 챙기는 거? (복수선택)', hint:'분해·수분 보충에 도움 돼요.',
    opts:[
      {v:'water', em:'💧', t:'물 자주 마심'},
      {v:'sugar', em:'🧃', t:'당/이온음료 함께'},
      {v:'food', em:'🍯', t:'분해 돕는 음식·숙취해소제(헛개·꿀물·컨디션 등)'},
    ]},
  { type:'choice', id:'sleep', q:'어젯밤 잠은 몇 시간 잤어요?', hint:'잠이 부족하면 같은 양에도 훨씬 빨리·세게 취하고 숙취도 심해져요.',
    opts:[
      {v:0, em:'😴', t:'7시간 이상 푹 잤음'},
      {v:1, em:'🙂', t:'5~7시간'},
      {v:2, em:'😪', t:'3~5시간 (부족)'},
      {v:3, em:'😵', t:'3시간 미만 / 거의 못 잠'},
    ]},
  { type:'choice', id:'condition', q:'지금 속·몸 상태는?', hint:'빈속이거나 몸이 안 좋으면 흡수가 빨라 더 위험해요.',
    opts:[
      {v:0, em:'😄', t:'든든하고 컨디션 좋음'},
      {v:1, em:'🙂', t:'보통'},
      {v:2, em:'😣', t:'속이 비었거나 더부룩함'},
      {v:3, em:'🤒', t:'몸살·감기·약 복용 중'},
    ]},
  { type:'choice', id:'tomorrow', q:'내일 일정은?', hint:'중요한 일정이 있으면 상한선을 더 낮춰요.',
    opts:[
      {v:0, em:'😎', t:'완전 휴무, 푹 쉴 수 있음'},
      {v:1, em:'📋', t:'가벼운 일정'},
      {v:2, em:'💼', t:'출근/중요한 일정 있음'},
    ]},
];

let step = 0;
const answers = { sex:'M', weight:65, age:30, hours:3, helpers:[] };

function render(){
  const q = Q[step];
  $('bar').style.width = ((step)/(Q.length))*100 + '%';
  let html = `<div class="q">${q.q}</div><div class="qhint">${q.hint}</div>`;

  if(q.type==='fields'){
    html += '<div class="num-row" style="flex-wrap:wrap">';
    q.fields.forEach(f=>{
      html += `<div style="flex:1 1 45%"><label class="fld">${f.label}</label>`;
      if(f.el==='select'){
        html += `<select id="f_${f.id}">`+f.opts.map(o=>`<option value="${o[0]}" ${answers[f.id]===o[0]?'selected':''}>${o[1]}</option>`).join('')+`</select>`;
      } else {
        html += `<input id="f_${f.id}" type="${f.t}" inputmode="decimal" value="${answers[f.id]??f.val}" ${f.step?`step="${f.step}"`:''}>`;
      }
      html += `</div>`;
    });
    html += '</div>';
  } else if(q.type==='choice'){
    html += '<div class="opts">';
    q.opts.forEach(o=>{
      const sel = answers[q.id]===o.v ? 'sel':'';
      html += `<div class="opt ${sel}" onclick="pick('${q.id}',${JSON.stringify(o.v)})"><span class="em">${o.em}</span> ${o.t}</div>`;
    });
    html += '</div>';
  } else if(q.type==='multi'){
    html += '<div class="opts">';
    q.opts.forEach(o=>{
      const sel = answers[q.id].includes(o.v) ? 'sel':'';
      html += `<div class="opt ${sel}" onclick="toggle('${q.id}','${o.v}')"><span class="em">${o.em}</span> ${o.t}</div>`;
    });
    html += '</div>';
  }
  $('qbox').innerHTML = html;
  $('prevBtn').style.visibility = step===0 ? 'hidden':'visible';
  $('nextBtn').textContent = step===Q.length-1 ? '결과 보기 🍶' : '다음';
}

function $(id){ return document.getElementById(id); }
function pick(id,v){ answers[id]=v; render(); }
function toggle(id,v){
  const a=answers[id];
  const i=a.indexOf(v);
  if(i>=0) a.splice(i,1); else a.push(v);
  render();
}
function saveFields(){
  const q=Q[step];
  if(q.type==='fields') q.fields.forEach(f=>{
    const el=$('f_'+f.id);
    answers[f.id] = f.t==='number' ? (+el.value||f.val) : el.value;
  });
}
function next(){
  saveFields();
  const q=Q[step];
  if(q.type==='choice' && answers[q.id]===undefined){ alert('하나 골라줘요 🙂'); return; }
  if(step<Q.length-1){ step++; render(); } else { showResult(); }
}
function prev(){ saveFields(); if(step>0){ step--; render(); } }

// ---- 적정량 계산 ----
function showResult(){
  const a = answers;
  const r = a.sex==='M' ? 0.68 : 0.55;
  const weight = Math.max(35, a.weight);
  const hours = Math.max(0.5, a.hours);

  // 목표 최고 혈중농도(BAC): 원하는 취기 × 주량 보정
  // 주량이 셀수록 같은 취기를 느끼는 BAC가 높음
  const blackoutWarn = a.goal===3;
  // 목표 취기(BAC)는 주량이 핵심 변수 — 말술은 같은 취기에 더 많이 필요
  const goalBAC = [0.03, 0.055, 0.085, 0.155][a.goal];
  const tolScale = [0.8, 1.0, 1.2, 1.5][a.tolerance];
  const targetBAC = goalBAC * tolScale;
  // 참고: 필름 끊김 시작 추정선 (이 사람 기준, 주량 반영)
  const blackoutBAC = 0.16 * tolScale;

  // 역(逆) Widmark: 그 BAC를 만드는 알코올 양(g)
  let grams = (targetBAC + 0.015*hours) * (weight * r * 10);

  // ---- 보정계수 ----
  const factors = [];
  let m = 1;
  const apply = (mult, up, label) => { m*=mult; factors.push({up, label, mult}); };

  if(a.redface===2){ apply(0.5, false, '얼굴 금방 빨개짐 (효소 약함)'); }
  else if(a.redface===1){ apply(0.75, false, '얼굴 빨개지는 편'); }

  const freqM=[1.0,0.95,0.82,0.65][a.freq];
  if(a.freq>=2) apply(freqM, false, a.freq===3?'거의 매일 음주 (간 휴식 필요)':'자주 음주');
  else if(a.freq===0) factors.push({up:true,label:'음주 빈도 낮음',mult:1});

  if(a.age>=50) apply(0.8,false,'50대 이상 (분해 느림)');
  else if(a.age>=40) apply(0.88,false,'40대');

  const snackM=[0.68,0.82,0.92,1.0][a.snack];
  if(a.snack===3) factors.push({up:true,label:'안주 든든히 먹음',mult:1});
  else apply(snackM,false, a.snack===0?'안주 아예 안 먹음(완전 빈속)':a.snack===1?'안주 거의 안 먹음(빈속)':'안주 조금');

  if(a.helpers.includes('water')) apply(1.05,true,'물 자주 마심');
  if(a.helpers.includes('sugar')) apply(1.02,true,'당/이온음료 함께');
  if(a.helpers.includes('food')) apply(1.05,true,'분해 돕는 음식·숙취해소제');

  const sleepM=[1.0,0.95,0.83,0.7][a.sleep];
  if(a.sleep>=2) apply(sleepM,false, a.sleep===3?'잠 거의 못 잠':'수면 부족');
  else if(a.sleep===0) factors.push({up:true,label:'충분히 잠',mult:1});

  const condM=[1.0,0.95,0.82,0.68][a.condition];
  if(a.condition>=2) apply(condM,false, a.condition===3?'몸살/약 복용 중':'빈속/더부룩');

  const tmrM=[1.0,0.92,0.78][a.tomorrow];
  if(a.tomorrow===2) apply(tmrM,false,'내일 출근/중요일정');
  else if(a.tomorrow===1) apply(tmrM,false,'내일 가벼운 일정');

  grams *= m;
  grams = Math.max(0, grams);

  // 소주 병 환산 + 0.5병 단위 반올림
  let bottles = grams / SOJU_BOTTLE_G;
  let bottlesRounded = Math.round(bottles*2)/2;
  const glasses = Math.round(grams / SOJU_GLASS_G);

  // 페이스 (시간당 잔)
  const pace = Math.max(1, glasses/hours);

  // 권장 물 (마시는 술 양 만큼 + α)
  const waterCups = Math.max(2, Math.round(glasses*0.7));

  // 위험 판정
  const onMeds = a.condition===3;
  const highRisk = (a.redface===2 && a.freq>=2) || (a.freq===3 && a.condition>=2) || a.sleep===3;
  let restDay = bottlesRounded < 0.5 || onMeds
    || (a.redface===2 && (a.condition>=2 || a.sleep>=2) && a.tomorrow===2);

  // 필름 끊김 시작 추정 잔/병 (경고선)
  const blackoutGrams = (blackoutBAC + 0.015*hours) * (weight * r * 10);
  const blackoutBottles = Math.round((blackoutGrams / SOJU_BOTTLE_G)*2)/2;

  renderResult({bottlesRounded, glasses, grams, pace, waterCups, targetBAC, factors, highRisk, restDay, hours, freq:a.freq, onMeds, blackoutWarn, blackoutBottles});
}

function renderResult(d){
  $('quizCard').style.display='none';
  const rc=$('resultCard'); rc.style.display='block';
  $('bar').style.width='100%';

  let verdict, amountHtml;
  if(d.restDay){
    verdict = '🛑 오늘은 쉬는 걸 강력 추천!';
    amountHtml = `<div class="amount" style="font-size:38px">오늘은<br>패스 🍵</div>`;
  } else {
    const b = d.bottlesRounded;
    const bText = b===Math.floor(b) ? `${b}병` : `${Math.floor(b)}병 반`;
    amountHtml = `<div class="label">오늘 소주 기준 적정 상한선</div>
      <div class="amount">${b===0?'0':bText.replace('병','')}<span class="unit"> ${b<1?'병 미만':bText.includes('반')?'병 반':'병'}</span></div>
      <div class="label">(약 ${d.glasses}잔 · 순수알코올 ${Math.round(d.grams)}g)</div>`;
    verdict = b>=3 ? '💪 비교적 여유 있는 날이네요' : b>=1.5 ? '🙂 적당히 즐기기 딱 좋아요' : '⚠️ 오늘은 가볍게 가세요';
  }

  let factorHtml = d.factors.filter(f=>f.mult!==1 || f.up).map(f=>
    `<div class="${f.up?'up':'dn'}">${f.up?'▲':'▼'} ${f.label}${f.mult!==1?` (×${f.mult})`:''}</div>`
  ).join('') || '<div style="opacity:.7">특별한 가감 요인 없음</div>';

  let html = `
    <div class="hero">${amountHtml}</div>
    <div class="verdict">${verdict}</div>`;

  if(!d.restDay){
    html += `
    <div class="info-grid">
      <div class="info"><div class="ic">⏱️</div><div class="t">페이스</div><div class="v">시간당 ${d.pace.toFixed(1)}잔 이하</div></div>
      <div class="info"><div class="ic">💧</div><div class="t">물</div><div class="v">최소 ${d.waterCups}잔 함께</div></div>
      <div class="info"><div class="ic">🩸</div><div class="t">목표 혈중농도</div><div class="v">${d.targetBAC.toFixed(3)}% 이하</div></div>
      <div class="info"><div class="ic">🍖</div><div class="t">안주</div><div class="v">첫 잔 전에 먼저</div></div>
    </div>
    <div class="subcard">
      <b>🍻 오늘의 작전</b>
      <ul class="tips">
        <li>첫 잔 전에 <b>안주·물 먼저</b> — 흡수 늦춰져요</li>
        <li><b>한 잔 마시면 물 한 잔</b> 번갈아 마시기</li>
        <li>위 상한선 ${d.bottlesRounded>=1?`${d.bottlesRounded}병`:'근처'} 넘어가면 <b>그만</b> 신호</li>
        <li>자기 전 물 2잔 + 다음날 따뜻한 국물</li>
      </ul>
    </div>`;
  } else {
    html += `<div class="subcard">
      <ul class="tips">
        ${d.onMeds ? `<li><b>약 복용 중에는 음주가 특히 위험</b>해요. 약효가 변하거나 간·위에 큰 무리가 갈 수 있어요</li>` : `<li>오늘은 체질·컨디션상 위험 신호가 커요</li>`}
        <li>꼭 마셔야 한다면 <b>한두 잔에서 멈추고</b> 물·안주 위주로</li>
        <li>"오늘 컨디션이 안 좋아서요"는 충분히 좋은 핑계예요 🙂</li>
      </ul></div>`;
  }

  if(d.blackoutWarn){
    html += `<div class="warn">🥃 <b>오케이, 갈 데까지 가보자는 거군요 😆</b><br>
    당신 주량 기준으로 계산하면 <b>소주 ${d.bottlesRounded}병</b>쯤에서 필름이 슬슬 끊길 수 있어요.
    (필름 끊김 시작선 ≈ ${d.blackoutBottles}병)<br><br>
    딱 하나만 — 갈 거면 <b>물이랑 안주는 꼭 챙기고, 천천히</b>! 그래야 다음날 덜 죽어요 🫶</div>`;
  }

  html += `<div><b>📊 내 가감 요인</b><div class="factors">${factorHtml}</div></div>`;

  if(d.highRisk){
    html += `<div class="warn">⚠️ <b>주의:</b> 자주 마시는 편 + 술 약한 체질 신호가 같이 보여요.
    이런 패턴이 계속되면 간 건강에 부담이 커요. 음주 횟수를 줄이는 걸 권해요.</div>`;
  }

  html += `<div class="nav"><button class="btn" onclick="location.reload()">🔄 다시 테스트</button></div>`;

  rc.innerHTML = html;
  rc.scrollIntoView({behavior:'smooth'});
}

render();
</script>
</body>
</html>
